# Netlify build configuration
[build]
  # This command runs your esbuild script from package.json
  command = "npm run build"
  # This is the directory where your serverless functions are stored
  functions = "netlify/functions"
  # This is the directory that Netlify will deploy (the root of your project)
  publish = "/"

# This section configures how your serverless functions are handled
[functions]
  # Using esbuild is crucial for correctly bundling TypeScript functions
  node_bundler = "esbuild"
